<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R3PTAR | MUSIC ARTIST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="grain-overlay"></div>
  <div class="ambient-glow"></div>

  <main class="portfolio-card">
    <header class="card-header">
      <span class="badge">Live Session 2026</span>
      <h1 class="logo">NOME<span class="accent-dot">.</span>ART</h1>
    </header>

    <section class="featured-content">
      <div class="media-container">
        <img src="https://images.unsplash.com/photo-1515175192010-cf3250992719?q=80&w=1032&auto=format&fit=crop"
          alt="Portada Sombras Nocturnas" class="cover-art" loading="lazy">
        <div class="play-trigger" aria-label="Reproducir">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
        </div>
      </div>

      <div class="track-info">
        <p class="label">Último Lanzamiento</p>
        <h2 class="track-title">SOMBRAS NOCTURNAS</h2>
        <div class="button-group">
          <a href="#" class="btn btn-primary">Spotify</a>
          <a href="#" class="btn btn-secondary">YouTube</a>
        </div>
      </div>
    </section>

    <footer class="tour-dates">
      <h3 class="section-title">Próximos Eventos</h3>
      <div class="date-row">
        <span class="date">15 ABR</span>
        <span class="location">Santiago, CL</span>
      </div>
      <div class="date-row">
        <span class="date">22 ABR</span>
        <span class="location">Buenos Aires, AR</span>
      </div>
    </footer>
  </main>
</body>

</html>
