<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Portfolio | Dark Edition</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="background-overlay"></div>

  <main class="glass-container">
    <header>
      <span class="status">● En Gira</span>
      <h1 class="artist-name">NOME<span>.</span>ARTISTA</h1>
      <nav class="social-icons">
        <a href="#">IG</a> / <a href="#">YT</a> / <a href="#">SP</a>
      </nav>
    </header>

    <section class="latest-release">
      <div class="album-art">
        <img src="https://via.placeholder.com/300/000000/FFFFFF?text=Album+Art" alt="Portada">
      </div>
      <div class="release-info">
        <p class="label">Último Lanzamiento</p>
        <h2>SOMBRAS NOCTURNAS</h2>
        <button class="btn-play">Escuchar Ahora</button>
      </div>
    </section>

    <section class="tour-dates">
      <h3>Tour 2026</h3>
      <div class="date-item">
        <span>15 Abr</span>
        <span class="city">Santiago, CL</span>
        <a href="#" class="ticket-link">Tickets</a>
      </div>
      <div class="date-item">
        <span>22 Abr</span>
        <span class="city">Buenos Aires, AR</span>
        <a href="#" class="ticket-link">Tickets</a>
      </div>
    </section>
  </main>
</body>

</html>
